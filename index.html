// ─── MATRIX RAIN ─────────────────────────────────────────────────────────
function MatrixRain() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
    resize(); window.addEventListener("resize", resize);
    const CH = "01アイウABCDEF{}[]";
    const SZ = 13; let d = [];
    const init = () => { d = Array.from({length:Math.floor(c.width/SZ)}, () => Math.random() * -60); };
    init(); window.addEventListener("resize", init);
    const draw = () => {
      ctx.fillStyle = "rgba(0,0,0,0.045)"; ctx.fillRect(0,0,c.width,c.height);
      ctx.font = `${SZ}px monospace`;
      d.forEach((y,i) => {
        if (y > 0) { ctx.fillStyle = Math.random() > .97 ? "rgba(180,255,180,0.55)" : "rgba(0,255,65,0.11)"; ctx.fillText(CH[Math.floor(Math.random()*CH.length)], i*SZ, y*SZ); }
        if (y*SZ > c.height && Math.random() > .975) d[i] = 0;
        d[i] += 0.45;
      });
    };
    const id = setInterval(draw, 55);
    return () => { clearInterval(id); window.removeEventListener("resize",resize); window.removeEventListener("resize",init); };
  }, []);
  return <canvas ref={ref} style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",opacity:0.12,pointerEvents:"none",zIndex:0}} />;
}

function Code({ code, lang }) {
  const [ok, setOk] = useState(false);
  const copy = () => { try { navigator.clipboard.writeText(code).then(()=>{ setOk(true); setTimeout(()=>setOk(false),1600); }); } catch(e){} };
  return (
    <div style={{background:"#04100a",border:"1px solid #1e4030",borderRadius:8,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:"#071408",borderBottom:"1px solid #1a3828"}}>
        <span style={{fontFamily:"monospace",fontSize:10,color:"#3d8050",letterSpacing:1}}>{lang==="bash"?"BASH":lang==="json"?"JSON":"PYTHON"}</span>
        <button onClick={copy} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:10,color:ok?"#00ff41":"#3d8050",padding:0}}>{ok?"✓ Copied":"Copy"}</button>
      </div>
      <pre style={{margin:0,padding:"12px 14px",fontFamily:"'SF Mono','Menlo','Courier New',monospace",fontSize:12.5,color:"#b0f0b0",lineHeight:1.9,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>{code}</pre>
    </div>
  );
}

}

function TermScreen({ term, onNav, onBack, backLabel, trail }) {
  const cat = catOf(term.cat);
  const grouped = {};
  (term.links||[]).forEach(l => { if(!grouped[l.rel]) grouped[l.rel]=[]; grouped[l.rel].push(l); });
  return (
    <div style={{position:"relative",zIndex:1}}>
      <div style={{padding:"14px 16px 12px",borderBottom:"1px solid #1a3325",background:"rgba(0,0,0,0.6)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"monospace",fontSize:11,color:"#3d9e4d",padding:0,letterSpacing:0.5,marginBottom:trail.length?6:10,display:"block"}}>← {backLabel}</button>
        {trail.length > 0 && (
          <div style={{fontFamily:"monospace",fontSize:9,color:"#3d8050",marginBottom:8,display:"flex",flexWrap:"wrap",gap:3,alignItems:"center"}}>
            {trail.map((t,i)=><span key={i} style={{opacity:0.7}}>{t.term}{" → "}</span>)}
            <span style={{color:"#5aaa6a"}}>{term.term}</span>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:38}}>{term.emoji}</span>
          <div>
            <div style={{fontFamily:"monospace",fontSize:9,color:cat?.color,letterSpacing:3,opacity:0.8,marginBottom:3}}>{cat?.label?.toUpperCase()}</div>
            <div style={{fontFamily:"'Courier New',monospace",fontSize:24,fontWeight:900,color:"#00ff41",letterSpacing:2,lineHeight:1,textShadow:"0 0 18px #00ff4140"}}>{term.term}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"14px 16px 90px"}}>
        <div style={{padding:"13px 15px",background:"#00ff4112",border:"1px solid #00ff4128",borderRadius:10,marginBottom:12}}>
          <div style={{fontFamily:"monospace",fontSize:9,color:"#00cc33",letterSpacing:2,marginBottom:6,fontWeight:700}}>💡 IN PLAIN ENGLISH</div>
          <div style={{fontFamily:"monospace",fontSize:14,color:"#e0ffe0",lineHeight:1.65,fontWeight:600}}>{term.simple}</div>
        </div>
        {term.analogy && (
          <div style={{padding:"13px 15px",background:"#06110a",border:"1px solid #1e4030",borderRadius:10,marginBottom:12}}>
            <div style={{fontFamily:"monospace",fontSize:9,color:"#3d8050",letterSpacing:2,marginBottom:6,fontWeight:700}}>🌍 REAL WORLD EXAMPLE</div>
            <div style={{fontFamily:"monospace",fontSize:13,color:"#a8dba8",lineHeight:1.75,fontStyle:"italic"}}>{term.analogy}</div>
          </div>
        )}
        <div style={{padding:"13px 15px",background:"#060e06",border:"1px solid #1e3d25",borderRadius:10,marginBottom:12}}>
          <div style={{fontFamily:"monospace",fontSize:9,color:"#3d8050",letterSpacing:2,marginBottom:6,fontWeight:700}}>📚 THE FULL STORY</div>
          <div style={{fontFamily:"monospace",fontSize:13.5,color:"#c8f0c8",lineHeight:1.9}}>{term.def}</div>
        </div>
        {term.code && (
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"monospace",fontSize:9,color:"#3d8050",letterSpacing:2,marginBottom:6,fontWeight:700}}>👀 SEE IT IN CODE</div>
            <Code code={term.code} lang={term.lang} />
          </div>
        )}
        {Object.keys(grouped).length > 0 && (
          <div style={{marginTop:6}}>
            <div style={{fontFamily:"monospace",fontSize:9,color:"#4a8a5a",letterSpacing:2,marginBottom:14,fontWeight:700}}>🔗 CONNECTED TERMS</div>
            {["NEXT","NEEDS","SEE","OPP"].filter(r=>grouped[r]).map(rel=>{
              const meta = REL[rel];
              return (
                <div key={rel} style={{marginBottom:14}}>
                  <div style={{fontFamily:"monospace",fontSize:10,color:meta.color,letterSpacing:1,marginBottom:8,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14}}>{meta.sym}</span>{meta.label.toUpperCase()}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                    {grouped[rel].map(l=>{
                      const t=byId(l.id); if(!t) return null;
                      return (
                        <button key={l.id} onClick={()=>onNav(t)}
                          style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:meta.color,background:meta.color+"14",border:`1px solid ${meta.color}50`,borderRadius:7,padding:"8px 13px",cursor:"pointer",textTransform:"uppercase",display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontSize:15}}>{t.emoji}</span>{t.term}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function PathwaysScreen({ onNav }) {
  return (
    <div style={{padding:"16px 16px 90px",position:"relative",zIndex:1}}>
      <div style={{fontFamily:"'Courier New',monospace",fontSize:22,fontWeight:900,color:"#00ff41",letterSpacing:2,marginBottom:4}}>DEV PATHWAYS</div>
      <div style={{fontFamily:"monospace",fontSize:13,color:"#a8dba8",lineHeight:1.65,marginBottom:20}}>Real workflows coders follow every day. Tap any step to learn what that term means.</div>
      {PATHWAYS.map(p=>(
        <div key={p.id} style={{marginBottom:22,border:`1px solid ${p.color}30`,borderRadius:12,overflow:"hidden"}}>
          <div style={{background:p.color+"18",padding:"13px 15px",borderBottom:`1px solid ${p.color}30`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{fontSize:20}}>{p.emoji}</span>
              <span style={{fontFamily:"monospace",fontSize:14,fontWeight:900,color:p.color,letterSpacing:1}}>{p.label}</span>
            </div>
            <div style={{fontFamily:"monospace",fontSize:11,color:p.color,opacity:0.8}}>{p.desc}</div>
          </div>
          <div style={{padding:"13px 14px",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <div style={{display:"flex",alignItems:"center",minWidth:"max-content"}}>
              {p.steps.map((id,i)=>{
                const t=byId(id); if(!t) return null;
                return (
                  <div key={id} style={{display:"flex",alignItems:"center"}}>
                    <button onClick={()=>onNav(t)} style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:p.color,background:p.color+"18",border:`1px solid ${p.color}50`,borderRadius:7,padding:"8px 11px",cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:13}}>{t.emoji}</span>{t.term}
                    </button>
                    {i<p.steps.length-1&&<span style={{fontFamily:"monospace",fontSize:15,color:p.color,opacity:0.4,margin:"0 2px"}}>→</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function BottomNav({ active, onChange }) {
  const tabs=[{id:"home",emoji:"🏠",label:"Home"},{id:"paths",emoji:"🗺️",label:"Paths"}];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"rgba(0,0,0,0.97)",borderTop:"1px solid #1a3325",display:"flex"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <span style={{fontSize:20}}>{t.emoji}</span>
          <span style={{fontFamily:"monospace",fontSize:9,letterSpacing:1,color:active===t.id?"#00ff41":"#3d8050",fontWeight:active===t.id?900:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function DevGlossary() {
  const [screen, setScreen]   = useState("home");
  const [catId, setCatId]     = useState(null);
  const [term, setTerm]       = useState(null);
  const [trail, setTrail]     = useState([]);
  const [backLabel, setBackLabel] = useState("HOME");
  const [search, setSearch]   = useState("");
  const [nav, setNav]         = useState("home");

  const goHome = () => { setScreen("home"); setCatId(null); setTerm(null); setTrail([]); setNav("home"); };
  const goCat  = id => { setCatId(id); setScreen("category"); setTerm(null); setTrail([]); setSearch(""); };
  const goTerm = (t, fromCat) => {
    if (screen === "term" && term) { setTrail(prev => [...prev, term]); setBackLabel(term.term); }
    else if (fromCat) { setTrail([]); setBackLabel(catOf(fromCat)?.label || "BACK"); }
    else { setTrail([]); setBackLabel("HOME"); }
    setTerm(t); setScreen("term"); setSearch("");
  };
  const goBack = () => {
    if (screen === "term" && trail.length > 0) {
      const prev = trail[trail.length - 1];
      setTerm(prev); setTrail(t => t.slice(0,-1));
      setBackLabel(trail.length > 1 ? trail[trail.length-2].term : (catId ? catOf(catId)?.label : "HOME"));
    } else if (screen === "term" && catId) { setTerm(null); setTrail([]); setScreen("category"); }
    else if (screen === "term") { goHome(); }
    else if (screen === "category") { setCatId(null); setScreen("home"); }
    else { goHome(); }
  };
  const handleNav = v => {
    setNav(v);
    if (v === "home") goHome();
    else { setScreen("paths"); setTerm(null); setTrail([]); }
  };

  // Hide loading screen once mounted
  useEffect(() => {
    const el = document.getElementById("loading");
    if (el) setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity 0.4s"; setTimeout(()=>el.remove(),400); }, 400);
  }, []);

  return (
    <div style={{background:"#000",minHeight:"100vh",overflowX:"hidden"}}>
      <MatrixRain />
      {screen === "home" && (
        <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(0,0,0,0.95)",backdropFilter:"blur(10px)",borderBottom:"1px solid #1a3325",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:17,fontWeight:900,color:"#00ff41",letterSpacing:2.5,textShadow:"0 0 16px #00ff4135"}}>DEV.GLOSSARY</div>
          <div style={{fontFamily:"monospace",fontSize:9,color:"#4a8a5a"}}>{TERMS.length} terms</div>
        </div>
      )}
      {screen==="home"     && <HomeScreen onCat={goCat} search={search} onSearch={setSearch} onTerm={goTerm} />}
      {screen==="category" && <CategoryScreen catId={catId} onTerm={goTerm} onBack={goBack} />}
      {screen==="term"     && <TermScreen term={term} onNav={goTerm} onBack={goBack} backLabel={backLabel} trail={trail} />}
      {screen==="paths"    && <PathwaysScreen onNav={t=>goTerm(t,null)} />}
      <BottomNav active={nav} onChange={handleNav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DevGlossary />);
</script>
</body>
</html>
